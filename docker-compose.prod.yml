# ════════════════════════════════════════════════════════════════════
# CRM Otron — Stack de PRODUÇÃO
# ════════════════════════════════════════════════════════════════════
# Sobe 5 serviços: postgres, redis, backend, frontend, nginx (proxy + SSL)
#
# Uso:
#   1. Copie e edite o arquivo .env.production (na raiz do projeto)
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# Para ver logs:   docker compose -f docker-compose.prod.yml logs -f backend
# Para parar:      docker compose -f docker-compose.prod.yml down
# Para atualizar:  git pull && docker compose -f docker-compose.prod.yml up -d --build
# ════════════════════════════════════════════════════════════════════

version: '3.8'

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: otron_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - otron_net
    # Não exponha 5432 ao mundo — só rede interna
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      retries: 5

  # ── Redis (Bull queue + cache) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: otron_redis
    restart: unless-stopped
    # Senha do Redis vem da REDIS_PASSWORD no .env
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - otron_net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  # ── Backend (API Node + Baileys) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: otron_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 8080
      PROXY_PORT: 8080
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_OPT_LIMITER_MAX: 1
      REDIS_OPT_LIMITER_DURATION: 3000
      USER_LIMIT: 10000
      CONNECTIONS_LIMIT: 100000
      CLOSED_SEND_BY_ME: 'true'
      MAIL_HOST: ${MAIL_HOST}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_PORT: ${MAIL_PORT}
    volumes:
      - whatsapp_sessions:/app/sessions
      - whatsapp_uploads:/app/public/uploads
    networks:
      - otron_net
    expose:
      - "8080"

  # ── Frontend (build estático servido por nginx interno) ────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${BACKEND_URL}
        REACT_APP_HOURS_CLOSE_TICKETS_AUTO: 24
    container_name: otron_frontend
    restart: unless-stopped
    networks:
      - otron_net
    expose:
      - "80"

  # ── Nginx reverse proxy + SSL (Let's Encrypt via Certbot) ──────────
  nginx:
    image: nginx:alpine
    container_name: otron_nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - otron_net

  # ── Certbot (renovação automática de SSL) ──────────────────────────
  certbot:
    image: certbot/certbot
    container_name: otron_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renova certificados a cada 12 horas (Certbot só renova se faltar <30 dias)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:
  whatsapp_uploads:
  certbot_certs:
  certbot_www:

networks:
  otron_net:
    driver: bridge

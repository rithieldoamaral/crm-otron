version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: crm_otron_postgres
    environment:
      POSTGRES_USER: otron_user
      POSTGRES_PASSWORD: otron_password
      POSTGRES_DB: otron_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: crm_otron_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
